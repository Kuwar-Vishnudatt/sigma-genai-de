version: 2

mart_transactions:
  description: "Mart containing aggregated transaction data with merchant details and business metrics."
  columns:
    - name: transaction_id
      description: "Unique identifier for each transaction."
    - name: merchant_id
      description: "Foreign key referencing the merchant who processed the transaction."
      tests:
        - not_null
    - name: merchant_name
      description: "Name of the merchant who processed the transaction."
    - name: amount
      description: "Amount of the transaction in USD."
    - name: status
      description: "Status of the transaction: COMPLETED, FAILED, PENDING."
      tests:
        - accepted_values:
            values: ['COMPLETED', 'FAILED', 'PENDING']
    - name: customer_id
      description: "Foreign key referencing the customer who made the transaction."
    - name: transaction_date
      description: "Date when the transaction occurred."
    - name: payment_method
      description: "Payment method used for the transaction: CREDIT_CARD, DEBIT_CARD, UPI."
    - name: total_revenue
      description: "Total revenue generated from completed transactions."
      tests:
        - generic_test:
            function: "test_total_revenue_gte_zero"
    - name: failure_rate_pct
      description: "Failure rate of transactions as a percentage."
      tests:
        - generic_test:
            function: "test_failure_rate_between_zero_and_one_hundred"
    - name: invalid_status_check
      description: "Check for invalid status values like 'CANCELLED'."
      tests:
        - generic_test:
            function: "test_invalid_status_cancelled"

  tests:
    - generic_test:
        function: "test_total_revenue_gte_zero"
    - generic_test:
        function: "test_failure_rate_between_zero_and_one_hundred"
    - generic_test:
        function: "test_invalid_status_cancelled"
